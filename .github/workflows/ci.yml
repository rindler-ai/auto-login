name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # --- Fail-closed secret + infra denial gate -------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks (default rules + Rindler infra denial ruleset)
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact -v

  # --- Belt-and-suspenders hostname guard (no infra host back in source) ----
  hostname-guard:
    name: Hostname guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no Rindler/Porter/RDS host in the source tree
        run: |
          set -e
          # Excludes the legal text, this guard, and the gitleaks config itself.
          # The apex form (^|[^a-z0-9.@-])rindler\.ai catches a bare rindler.ai while
          # NOT matching the intentional security@rindler.ai disclosure contact (preceded by '@').
          if grep -rInE '[a-z0-9-]+\.rindler\.ai|(https?|wss?)://([a-z0-9-]+\.)*rindler\.ai|(^|[^a-z0-9.@-])rindler\.ai|[a-z0-9-]+\.onporter\.run|\.rds\.amazonaws|\binfisical\b|\binkbox\b' . \
              --exclude-dir=.git \
              --exclude=LICENSE --exclude=COPYING.GPL-3 --exclude=.gitleaks.toml \
              --exclude-dir=.github ; then
            echo "::error::An internal infrastructure hostname/vendor reference reappeared in the tree. Use a config placeholder (your-hub.example)."
            exit 1
          fi
          echo "Hostname guard passed."

  # --- Go core + daemon: format, vet, build, test ---------------------------
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [core, daemon]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo 'run gofmt'; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  # --- Android APK (needs the gomobile .aar, so builds the Go core first) ----
  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"
      - name: Build gomobile .aar
        working-directory: daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: make android
      - name: Assemble debug APK
        working-directory: daemon/shells/android
        run: ./gradlew assembleDebug

  # --- iOS + macOS compile (requires a macOS runner + Xcode) ----------------
  ios:
    name: iOS/macOS build
    # macos-15 ships Xcode 16, needed because current xcodegen emits an Xcode-16
    # project format (77) that Xcode 15.4 (the macos-14 default) cannot open.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build gomobile xcframework
        working-directory: daemon
        run: make ios
      - name: Build iOS + macOS apps (unsigned)
        working-directory: daemon
        run: |
          make ios-app
          make macos-app
