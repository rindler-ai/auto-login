name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # --- Fail-closed secret + infra denial gate -------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: gitleaks (default rules + Rindler infra denial ruleset)
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact -v

  # --- Belt-and-suspenders hostname guard (no infra host back in source) ----
  hostname-guard:
    name: Hostname guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no Rindler/Porter/RDS host in the source tree
        run: |
          set -e
          # Excludes the legal text, this guard, and the gitleaks config itself.
          # The apex form (^|[^a-z0-9.@-])rindler\.ai catches a bare rindler.ai while
          # NOT matching the intentional security@rindler.ai disclosure contact (preceded by '@').
          if grep -rInE '[a-z0-9-]+\.rindler\.ai|(https?|wss?)://([a-z0-9-]+\.)*rindler\.ai|(^|[^a-z0-9.@-])rindler\.ai|[a-z0-9-]+\.onporter\.run|\.rds\.amazonaws|\binfisical\b|\binkbox\b' . \
              --exclude-dir=.git \
              --exclude=LICENSE --exclude=COPYING.GPL-3 --exclude=.gitleaks.toml \
              --exclude-dir=.github ; then
            echo "::error::An internal infrastructure hostname/vendor reference reappeared in the tree. Use a config placeholder (your-hub.example)."
            exit 1
          fi
          echo "Hostname guard passed."

  # --- Go core + daemon: format, vet, build, test ---------------------------
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [core, daemon]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo 'run gofmt'; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  # --- Android APK (needs the gomobile .aar, so builds the Go core first) ----
  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"
      - name: Build gomobile .aar
        working-directory: daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: make android
      - name: Assemble debug APK
        working-directory: daemon/shells/android
        run: ./gradlew assembleDebug

  # --- iOS + macOS compile (requires a macOS runner + Xcode) ----------------
  ios:
    name: iOS/macOS build
    # macos-15 ships Xcode 16, needed because current xcodegen emits an Xcode-16
    # project format (77) that Xcode 15.4 (the macos-14 default) cannot open.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build gomobile xcframework
        working-directory: daemon
        run: make ios
      - name: Build iOS + macOS apps (unsigned)
        working-directory: daemon
        run: |
          make ios-app
          make macos-app

  # --- Clean-update gate: an Android update installs over the previous one only ---
  # if applicationId is unchanged and versionCode strictly increases (and it is
  # signed with the same key — a release-time/keystore concern). This gate pins
  # applicationId + version formats, and requires a versionCode bump whenever the
  # app's Kotlin/manifest source changes, so every shipped change stays updatable.
  version-gate:
    name: App version gate (clean updates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: applicationId pin + version format
        run: ./scripts/check-app-version.sh
      - name: Require a versionCode bump when Android source changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # Only meaningful with a base to diff against (pull_request). Skip otherwise.
          if [ -z "${BASE_SHA:-}" ]; then
            echo "no PR base ref — skipping the diff-based bump check"; exit 0
          fi
          git fetch --no-tags --depth=1 origin "$BASE_SHA" >/dev/null 2>&1 || true
          GRADLE="daemon/shells/android/app/build.gradle.kts"
          # Did any APK-affecting source change (Kotlin or the manifest)?
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            'daemon/shells/android/**/*.kt' 'daemon/shells/android/**/AndroidManifest.xml' | wc -l | tr -d ' ')
          if [ "$CHANGED" = "0" ]; then
            echo "no Android Kotlin/manifest change — versionCode bump not required"; exit 0
          fi
          HEAD_VCODE=$(grep -oE 'versionCode = [0-9]+' "$GRADLE" | grep -oE '[0-9]+' | head -1)
          BASE_VCODE=$(git show "$BASE_SHA:$GRADLE" 2>/dev/null | grep -oE 'versionCode = [0-9]+' | grep -oE '[0-9]+' | head -1 || echo 0)
          if [ "$HEAD_VCODE" -le "${BASE_VCODE:-0}" ]; then
            echo "::error::Android source changed but versionCode ($HEAD_VCODE) did not increase past base (${BASE_VCODE:-0}). Bump versionCode (and versionName) in $GRADLE so the update installs cleanly over the previous build."
            exit 1
          fi
          echo "versionCode bumped $BASE_VCODE -> $HEAD_VCODE — update-clean"

  # --- Reminder: refresh the README screenshots when the app UI changes ----------
  # Advisory-style gate — a red check nudges the author to update docs/screenshots/
  # (see docs/screenshots/METHODOLOGY.md, demo data only). Satisfy it by updating
  # the screenshots, or by adding a `Screenshots: <reason>` trailer to a commit when
  # a UI change has no visible effect.
  screenshots-current:
    name: Screenshots up to date (reminder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remind to refresh screenshots on UI changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            echo "no PR base ref — the screenshots reminder only runs on pull requests"; exit 0
          fi
          git fetch --no-tags --depth=50 origin "$BASE_SHA" >/dev/null 2>&1 || true
          UI_DIR=daemon/shells/android/app/src/main/java/ai/rindler/autologin/ui
          UI_CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- "$UI_DIR" | wc -l | tr -d ' ')
          if [ "$UI_CHANGED" = "0" ]; then
            echo "no change under $UI_DIR — screenshots not affected"; exit 0
          fi
          if git log --format='%B' "$BASE_SHA"...HEAD | grep -qiE '^Screenshots:'; then
            echo "acknowledged via a 'Screenshots:' commit trailer — OK"; exit 0
          fi
          SHOTS_CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- docs/screenshots/ | wc -l | tr -d ' ')
          if [ "$SHOTS_CHANGED" != "0" ]; then
            echo "docs/screenshots/ updated alongside the UI change — OK"; exit 0
          fi
          echo "::error::The Android UI ($UI_DIR) changed but docs/screenshots/ was not updated."
          echo "::error::Refresh the affected screenshots (docs/screenshots/METHODOLOGY.md — demo data only),"
          echo "::error::or add a 'Screenshots: <reason>' trailer to a commit if this UI change has no visible effect."
          exit 1
